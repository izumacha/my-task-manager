name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          # cairosvg (ウィンドウアイコン表示用オプション依存) は requirements.txt に含まれない
          # ため、この行で明示的にインストールし、全 OS/Python の組み合わせで cairosvg 自体が
          # 問題なくインストールできることを CI で引き続き検証する（reminder/notifications.py
          # の _set_window_icon() がオプション依存として扱うコードパスの回帰確認）。
          pip install -e ".[icon]"

      - name: Run tests
        run: python -m pytest tests -v
